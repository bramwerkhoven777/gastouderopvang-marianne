                              padding: 2rem;

                              font-size: 2.5rem;

                .stat-label {
                              color: #666;
                              margin-top: 0.5rem;
                }

                h2 {
                              font-size: 2.5rem;
                              color: #b8956a;
                              margin-bottom: 2rem;
                              text-align: center;
                }

                .features-grid {
                              display: grid;
                              grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

                              margin-top: 2rem;
                }
